version: 0.2
env:
  variables:
    # Set these as CodeBuild env overrides or via SSM in your pipeline.
    DEPLOY_BUCKET: ""
    CLOUDFRONT_DISTRIBUTION_ID: ""
  parameter-store:
    # Example: pull the API base URL the backend exported to SSM.
    VITE_API_BASE_URL: "//api-base-url"
phases:
  install:
    runtime-versions:
      nodejs: $NODE_VERSION
  pre_build:
    commands:
      - aws codeartifact login --tool npm --domain "$CA_DOMAIN" --domain-owner "$CA_DOMAIN_OWNER" --repository "$CA_REPO" --region "$AWS_DEFAULT_REGION"
      - npm ci || npm install
  build:
    commands:
      - npm run build
  post_build:
    commands:
      - |
        if [ -n "$DEPLOY_BUCKET" ]; then
          aws s3 sync dist/ "s3://$DEPLOY_BUCKET" --delete
          if [ -n "$CLOUDFRONT_DISTRIBUTION_ID" ]; then
            aws cloudfront create-invalidation --distribution-id "$CLOUDFRONT_DISTRIBUTION_ID" --paths "/*"
          fi
        else
          echo "DEPLOY_BUCKET not set — build artifacts left in dist/ only."
        fi
artifacts:
  base-directory: dist
  files:
    - "**/*"
