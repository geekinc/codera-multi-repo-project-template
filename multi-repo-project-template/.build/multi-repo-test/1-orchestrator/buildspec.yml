version: 0.2
phases:
  install:
    runtime-versions:
      nodejs: $NODE_VERSION
  build:
    commands:
      - echo "Validating orchestrator docs..."
      # Fail the build if required architecture/task docs are missing.
      - test -f architecture/overview.md || (echo "Missing architecture/overview.md" && exit 1)
      - test -d tasks || (echo "Missing tasks/ directory" && exit 1)
      - echo "Docs OK."
